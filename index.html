<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Carol</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/2764.png" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* Estilos para la sección final del contador */
        .final-seccion {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, transparent, rgba(239, 68, 68, 0.05));
        }

        .contador-intro {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 1rem;
            color: #94a3b8; /* Color grisáceo suave */
            margin-bottom: 20px;
            font-style: italic;
        }

        #contador {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 0 auto 40px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(239, 68, 68, 0.2);
            max-width: fit-content;
        }

        .contador-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }

        .contador-numero {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ef4444;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        .contador-etiqueta {
            font-size: 0.7rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <audio id="musica" loop preload="auto">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <header>
        <div class="header-content">
            <h1>Me encantas Carol...</h1>
            <p class="subtitle">Un pequeño detalle, para toda la vida</p>
            <div class="divider"></div>
            <p class="scroll-hint">Toca cualquier parte y desliza para recordar... ↓</p>
        </div>
    </header>

    <div class="timeline" id="galeria"></div>

    <section class="final-seccion">
        <p class="contador-intro">Cada segundo de nuestra historia desde aquel 21 de noviembre...</p>
        <div id="contador"></div>
    </section>

    <footer>
        <div class="footer-content">
            <p class="final-msg">Te deseo lo mejor en cada paso que des.</p>
            <p class="signature">Con cariño, Johan</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <script>
        const galeria = document.getElementById("galeria");
        const totalFotos = 116; 
        const track = document.getElementById('musica');

        const fechaInicio = new Date(2022, 10, 21, 0, 0, 0); 

        function actualizarContador() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;

            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

            const contadorDoc = document.getElementById("contador");
            if (contadorDoc) {
                contadorDoc.innerHTML = `
                    <div class="contador-item">
                        <span class="contador-numero">${dias}</span>
                        <span class="contador-etiqueta">Días</span>
                    </div>
                    <div class="contador-item">
                        <span class="contador-numero">${horas}</span>
                        <span class="contador-etiqueta">Hrs</span>
                    </div>
                    <div class="contador-item">
                        <span class="contador-numero">${minutos}</span>
                        <span class="contador-etiqueta">Min</span>
                    </div>
                    <div class="contador-item">
                        <span class="contador-numero">${segundos}</span>
                        <span class="contador-etiqueta">Seg</span>
                    </div>
                `;
            }
        }

        setInterval(actualizarContador, 1000);
        actualizarContador();

        function iniciarMusica() {
            track.muted = false;
            track.volume = 1.0; 
            track.play().then(() => {
                document.removeEventListener('click', iniciarMusica);
                document.removeEventListener('touchstart', iniciarMusica);
                window.removeEventListener('scroll', iniciarMusica);
            }).catch(e => console.log("Esperando interacción para el audio..."));
        }

        document.addEventListener('click', iniciarMusica);
        document.addEventListener('touchstart', iniciarMusica);
        window.addEventListener('scroll', iniciarMusica, { once: true });

        const frases = [
            "Gracias por ser mi lugar seguro", "Por cada palabra de aliento",
            "Tu paso por mi vida es un regalo", "Gracias por enseñarme tanto",
            "Me llevo lo mejor de ti en el corazón", "Gracias por la paciencia y las risas",
            "Fuiste la mejor parte de mis días", "Gracias por creer en mí",
            "Agradezco al destino por cruzarnos", "Gracias por dejar una huella imborrable",
            "No hay código que mida mi gratitud", "Gracias por hacerme mejor persona",
            "Por los consejos y por estar ahí", "Gracias por este tiempo mágico",
            "Gracias por cada segundo compartido", "Este día debería ser eterno",
            "Una imagen que dice más que mil líneas", "Nuestra complicidad en una foto",
            "Lo que vivimos nadie nos lo quita", "Aún puedo escucharnos reír aquí",
            "Un tesoro guardado en pixeles", "El arte de coincidir en el momento exacto",
            "Momentos que se vuelven refugio", "Nuestra historia es mi película favorita",
            "Donde hubo risas, queda un recuerdo", "La vida es esto: momentos mágicos",
            "Retratos de una etapa inolvidable", "Cada foto es un 'te quiero' silencioso",
            "Mi rincón favorito de la memoria", "No es solo una foto, es un pedazo de vida"
        ];

        for (let i = 1; i <= totalFotos; i++) {
            const momento = document.createElement("div");
            momento.className = "momento";
            const fraseAleatoria = frases[Math.floor(Math.random() * frases.length)];

            momento.innerHTML = `
                <div class="image-wrapper">
                    <img src="Imagenes/fotos (${i}).jpg" alt="Recuerdo ${i}" loading="lazy">
                </div>
                <div class="caption">
                    <svg class="heart-svg" viewBox="0 0 32 32" width="20" height="20">
                        <path fill="#ef4444" d="M16 28.5L14.1 26.8C7.33 20.67 3 16.74 3 11.91C3 7.96 6.09 4.87 10.04 4.87C12.28 4.87 14.41 5.91 15.82 7.55L16 7.76L16.18 7.55C17.59 5.91 19.72 4.87 21.96 4.87C25.91 4.87 29 7.96 29 11.91C29 16.74 24.67 20.67 17.9 26.81L16 28.5Z"/>
                    </svg>
                    <p>${fraseAleatoria} #${i}</p>
                </div>
            `;
            galeria.appendChild(momento);
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = "1";
                    entry.target.style.transform = "translateY(0)";
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.momento').forEach(m => {
            m.style.opacity = "0";
            m.style.transform = "translateY(30px)";
            m.style.transition = "all 0.8s ease-out";
            observer.observe(m);
        });

        // Animación para que la sección final aparezca suavemente
        const finalSeccion = document.querySelector('.final-seccion');
        finalSeccion.style.opacity = "0";
        finalSeccion.style.transition = "opacity 1.5s ease-in";
        
        const finalObserver = new IntersectionObserver((entries) => {
            if(entries[0].isIntersecting) {
                finalSeccion.style.opacity = "1";
            }
        }, { threshold: 0.2 });
        finalObserver.observe(finalSeccion);

        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 15) {
                confetti({
                    particleCount: 150, spread: 80, origin: { y: 0.8 },
                    colors: ['#ef4444', '#38bdf8', '#ffffff']
                });
            }
        };
    </script>
</body>
</html>
